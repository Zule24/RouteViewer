# Builds RouteViewer.exe and AddFarm.exe on a Windows runner using PyInstaller.
#
# Triggers:
#   - Push to main           (continuous builds)
#   - Tag matching v*        (release builds attached to a GitHub Release)
#   - Manual via the Actions tab ("Run workflow")
#
# Output:
#   RouteViewer-windows/
#     RouteViewer.exe            -- the main application
#     AddFarm.exe                -- utility to add new farms (no Python needed)
#     distance_matrix.csv        -- road distances (kept outside the bundle)
#     duration_matrix.csv        -- road durations (kept outside the bundle)
#     extracted.xlsx             -- farm coordinate registry
#     routes.db                  -- map visualizer database
#
# The two CSVs, extracted.xlsx, and routes.db are intentionally NOT bundled
# inside RouteViewer.exe. They live next to it so AddFarm.exe can update them
# without rebuilding. The viewer loads them from get_matrix_dir() =
# Path(sys.executable).parent at runtime.
#
# Place this file at .github/workflows/build-windows.yml in your repo.

name: Build Windows exe

on:
  push:
    branches: [main]
    paths:    ['viewer160.py', 'add_farm.py']
    tags:     ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 openpyxl requests

      - name: Sanity-check the source
        run: |
          python -m py_compile viewer160.py
          python viewer160.py --selftest
          python -m py_compile add_farm.py

      - name: Build RouteViewer.exe
        run: >
          pyinstaller --onefile --windowed --name "RouteViewer"
          --add-data "three_window_farms.json;."
          viewer160.py

      - name: Build AddFarm.exe
        run: >
          pyinstaller --onefile --windowed --name "AddFarm"
          add_farm.py

      - name: Assemble release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release
          Copy-Item dist\RouteViewer.exe   release\
          Copy-Item dist\AddFarm.exe       release\
          Copy-Item distance_matrix.csv    release\
          Copy-Item duration_matrix.csv    release\
          Copy-Item routes.db              release\

      - name: Smoke-test RouteViewer.exe
        shell: pwsh
        run: |
          .\release\RouteViewer.exe --selftest
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload release folder as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: RouteViewer-windows
          path: release/
          if-no-files-found: error

      - name: Attach files to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/RouteViewer.exe
            release/AddFarm.exe
            release/distance_matrix.csv
            release/duration_matrix.csv
            release/extracted.xlsx
            release/routes.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
