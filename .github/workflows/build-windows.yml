# Builds RouteViewer.exe on a Windows runner using PyInstaller.
#
# Triggers:
#   - Push to main           (continuous builds)
#   - Tag matching v*        (release builds attached to a GitHub Release)
#   - Manual via the Actions tab ("Run workflow")
#
# Output:
#   RouteViewer-windows/
#     RouteViewer.exe            — the application
#     distance_matrix.csv        — road distances (kept OUTSIDE the bundle)
#     duration_matrix.csv        — road durations (kept OUTSIDE the bundle)
#     add_farm.py                — utility to add new farms without rebuilding
#
# The two CSV files are intentionally NOT bundled inside the exe.  They live
# next to it so that add_farm.py can update them independently.  The viewer
# loads them from get_matrix_dir() = Path(sys.executable).parent at runtime.
#
# Place this file at .github/workflows/build-windows.yml in your repo.

name: Build Windows exe

on:
  push:
    branches: [main]
    paths:    ['viewer160.py']   # only rebuild when the source changes
    tags:     ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 openpyxl

      - name: Sanity-check the source (compile + self-tests)
        run: |
          python -m py_compile viewer160.py
          python viewer160.py --selftest

      - name: Build with PyInstaller
        # --onefile           single self-contained exe
        # --windowed          suppress the console window behind the GUI
        # Note: distance_matrix.csv and duration_matrix.csv are NOT bundled —
        # they live next to the exe and are distributed as separate files.
        # Only three_window_farms.json is bundled (it is read-only config).
        run: >
          pyinstaller --onefile --windowed --name "RouteViewer"
          --add-data "three_window_farms.json;."
          viewer160.py

      - name: Assemble release folder
        # Copy the exe plus the external data files into a single folder so
        # the artifact download contains everything needed to run the program.
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release
          Copy-Item dist\RouteViewer.exe   release\
          Copy-Item distance_matrix.csv    release\
          Copy-Item duration_matrix.csv    release\
          Copy-Item add_farm.py            release\

      - name: Smoke-test the exe
        shell: pwsh
        run: |
          .\release\RouteViewer.exe --selftest
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload release folder as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: RouteViewer-windows
          path: release/
          if-no-files-found: error

      - name: Attach files to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/RouteViewer.exe
            release/distance_matrix.csv
            release/duration_matrix.csv
            release/add_farm.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
